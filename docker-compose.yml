services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rappi
      POSTGRES_PASSWORD: rappi
      POSTGRES_DB: rappi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rappi:rappi@db:5432/rappi
      MRSUSHI_API_URL: ${MRSUSHI_API_URL:-http://host.docker.internal:3000}
      RAPPI_WEBHOOK_SECRET: ${RAPPI_WEBHOOK_SECRET:-change-me}
      RAPPI_JWT_SECRET: ${RAPPI_JWT_SECRET:-change-me-jwt}
      RAPPI_ADMIN_USER: ${RAPPI_ADMIN_USER:-admin}
      RAPPI_ADMIN_PASSWORD: ${RAPPI_ADMIN_PASSWORD:-admin123}
    depends_on:
      - db

volumes:
  pgdata:
